// HOCON config for the agent-pipeline demo.
//
// Environment variables (required — fail fast if unset):
//   SNOWFLAKE_ACCOUNT          e.g. my_org-my_account
//   SNOWFLAKE_USER             your Snowflake login name
//   SNOWFLAKE_ROLE             role used to run the demo (ACCOUNTADMIN works; least-privilege is fine too)
//   SNOWFLAKE_WAREHOUSE        warehouse to bill the demo to
//                              (DEMO_WH_${DEMO_NONCE} is created by `run.sh provision`)
//   SNOWFLAKE_PRIVATE_KEY_PATH absolute path to a .p8 private key file for the user
//   DEMO_NONCE                 random nonce appended to every database / role / warehouse name
//                              so this demo can run in a shared Snowflake account without colliding
//                              with another consultant's run. `run.sh` generates and persists this
//                              in `build/.nonce` automatically — no need to set it by hand.

connections {
    demo_sf {
        url = "jdbc:snowflake://"${SNOWFLAKE_ACCOUNT}".snowflakecomputing.com"
        properties {
            user = ${SNOWFLAKE_USER}
            role = ${SNOWFLAKE_ROLE}
            warehouse = ${SNOWFLAKE_WAREHOUSE}
            private_key_file = ${SNOWFLAKE_PRIVATE_KEY_PATH}
            database = "DEMO_GOLD_"${DEMO_NONCE}
        }
    }
}

ds {
    datasources {
        demo_sf {
            connection = ${connections.demo_sf}
            // Scope every `toolkit ds *` command on this datasource to the three nonced
            // demo databases. Critical in a shared Snowflake account so scan / history /
            // lineage / discovery-build don't fan out across other consultants' work.
            // The scan snapshot produced under this filter is reused by every downstream
            // command (lineage --scan-only, agent discovery-build, agent discovery --use-index).
            filters {
                patterns = [
                    "DEMO_BRONZE_"${DEMO_NONCE}".MAIN.*"
                    "DEMO_SILVER_"${DEMO_NONCE}".MAIN.*"
                    "DEMO_GOLD_"${DEMO_NONCE}".MAIN.*"
                ]
            }
        }
    }
}

provision {
    connection = ${connections.demo_sf}
    variables {
        nonce = ${DEMO_NONCE}
    }
}

llmClient {
  type = AmazonBedrock
  model = global.anthropic.claude-sonnet-4-6
  requestTimeout = 1000s
  socketTimeout = 1000s
}

